name: Build and Deploy Webpage to GitHub Pages

on:
  # Allows the upstream Docusaurus site to be deployed manually if needed.
  # Keep this off push in forks so it does not overwrite the standalone
  # webcam diagnostics GitHub Pages deployment.
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-webpage:
    name: Build Webpage
    uses: ./.github/workflows/webpage_build.yml
    secrets: inherit

  deploy-webpage:
    name: Deploy to GitHub Pages
    needs: build-webpage

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
