name: Deploy Webcam Diagnostics to GitHub Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - webpage/static/webcam-diagnostics/**
      - .github/workflows/webcam_diagnostics_pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: webcam-diagnostics-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Static Page
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p public
          cp -R webpage/static/webcam-diagnostics/. public/
          touch public/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
